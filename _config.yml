# Site settings
title: Nooshin
email: info@nooshin-orouji.art
url: https://nooshin-orouji.art/
description: "Write an awesome description for your new site here. You can edit this line in _config.yml. It will appear in your document head meta (for Google search results) and in your feed.xml site description."
keywords: "graphics, design, UX, UI"
skills: "Illustrator - Graphic Artist - User Experience Designer"
meta_author: Orouji Nooshin

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: ffb3ff #18bc9c
  primary-rgb: "255,179,255" #"24,288,156"
  secondary: 70a6db #2c3e50
  secondary-dark: 70a6db #233140

# Backgrounds
header_background_image: lineart.png
portfolio_background_image: bak.svg

# Footer settings
footer:
  copyright: Nooshin Orouji
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: twitter
    url: https://twitter.com/jekyllrb
  - title: facebook
    url:
  - title: linkedin
    url: https://www.linkedin.com/in/nooshin-orouji
  - title: bitbucket
    url: https://bitbucket.org
  - title: github
    url: https://github.com

# Postal address (add as many lines as necessary)
address:
  - line: Delft, Netherlands

# Credits content
credits: 'Freelancer is a free to use, open source Bootstrap theme created by <a href="https://startbootstrap.com">Start Bootstrap</a>.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
